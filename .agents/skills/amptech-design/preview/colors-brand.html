<!doctype html>
<!-- @dsCard group="Brand" name="Colors — Brand Core" subtitle="Amp Red, Steel Gray, Ink, Paper — pixel-sampled from the logo" viewport="700x200" -->
<html><head><meta charset="utf-8"><title>Brand Core Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .frame { padding: 20px 24px; font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border-radius: var(--r-3); padding: 14px; height: 128px; display:flex; flex-direction:column; justify-content:space-between; box-shadow: var(--shadow-inset); }
  .name { font-size: 13px; font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.02em; opacity: 0.85; }
  .role { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; opacity: 0.85; }
</style></head>
<body>
<div class="frame">
  <div class="row">
    <div class="sw" style="background: var(--amp-red); color:#fff;">
      <div class="role">Primary · Accent</div>
      <div><div class="name">Amp Red</div><div class="hex">#D41E10</div><div class="hex" style="opacity:.65;">R212 G30 B16</div></div>
    </div>
    <div class="sw" style="background: var(--amp-steel); color:#fff;">
      <div class="role">Primary · Mark</div>
      <div><div class="name">Steel Gray</div><div class="hex">#4D4D4D</div><div class="hex" style="opacity:.65;">R77 G77 B77</div></div>
    </div>
    <div class="sw" style="background: var(--amp-ink); color:#fff;">
      <div class="role">Secondary · Near-black</div>
      <div><div class="name">Ink</div><div class="hex">#141414</div><div class="hex" style="opacity:.65;">softened from #000</div></div>
    </div>
    <div class="sw" style="background: #fff; color: var(--fg1); border: 1px solid var(--border);">
      <div class="role">Secondary · Ground</div>
      <div><div class="name">Paper</div><div class="hex">#FFFFFF</div><div class="hex" style="opacity:.65; color: var(--fg3);">R0 G0 B0 (bg)</div></div>
    </div>
  </div>
</div>
</body></html>
