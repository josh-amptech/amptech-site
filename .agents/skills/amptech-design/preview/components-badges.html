<!doctype html>
<!-- @dsCard group="Brand" name="Components — Badges & Chips" subtitle="Status + engineering state" viewport="700x140" -->
<html><head><meta charset="utf-8"><title>Badges & Chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .frame { padding: 22px 24px; font-family: var(--font-body); display:flex; flex-direction:column; gap: 14px; }
  .row { display:flex; gap: 8px; flex-wrap: wrap; align-items:center; }
  .badge { display:inline-flex; align-items:center; gap: 6px; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: var(--r-full); letter-spacing: 0.04em; }
  .b-red { background: var(--danger-subtle); color: var(--danger); }
  .b-green { background: var(--success-subtle); color: var(--success); }
  .b-amber { background: var(--warning-subtle); color: var(--warning); }
  .b-blue { background: var(--info-subtle); color: var(--info); }
  .b-ink { background: var(--amp-ink); color:#fff; }
  .b-outline { background: transparent; color: var(--fg2); border: 1px solid var(--border-strong); }
  .dot { width: 6px; height: 6px; border-radius: var(--r-full); background: currentColor; }
  .cap { font-size: 10px; color: var(--fg3); letter-spacing:.1em; text-transform:uppercase; font-weight:600; }
</style></head>
<body>
<div class="frame">
  <div class="row">
    <span class="badge b-red"><span class="dot"></span>Blocked</span>
    <span class="badge b-green"><span class="dot"></span>Shipped</span>
    <span class="badge b-amber"><span class="dot"></span>Review</span>
    <span class="badge b-blue"><span class="dot"></span>In progress</span>
    <span class="badge b-ink">PROD</span>
    <span class="badge b-outline">v0.4.2</span>
  </div>
  <div class="cap">Status · engineering state badges (pill radius, all-lowercase except versions)</div>
</div>
</body></html>
