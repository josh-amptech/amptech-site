<!doctype html>
<!-- @dsCard group="Brand" name="Colors — Neutral Scale" subtitle="0–900 cool neutral ramp" viewport="700x180" -->
<html><head><meta charset="utf-8"><title>Neutral Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .frame { padding: 20px 24px; font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
  .sw { border-radius: var(--r-2); padding: 8px 6px; height: 110px; display:flex; flex-direction:column; justify-content:space-between; }
  .tok { font-family: var(--font-mono); font-size: 9px; opacity: 0.85; }
  .hex { font-family: var(--font-mono); font-size: 9px; opacity: 0.7; }
</style></head>
<body>
<div class="frame">
  <div class="row">
    <div class="sw" style="background:#FFFFFF; color:#141414; border:1px solid var(--border);"><div class="tok">0</div><div class="hex">#FFFFFF</div></div>
    <div class="sw" style="background:#F7F7F7; color:#141414;"><div class="tok">50</div><div class="hex">#F7F7F7</div></div>
    <div class="sw" style="background:#EEEEEE; color:#141414;"><div class="tok">100</div><div class="hex">#EEEEEE</div></div>
    <div class="sw" style="background:#DEDEDE; color:#141414;"><div class="tok">200</div><div class="hex">#DEDEDE</div></div>
    <div class="sw" style="background:#C4C4C4; color:#141414;"><div class="tok">300</div><div class="hex">#C4C4C4</div></div>
    <div class="sw" style="background:#9A9A9A; color:#fff;"><div class="tok">400</div><div class="hex">#9A9A9A</div></div>
    <div class="sw" style="background:#6B6B6B; color:#fff;"><div class="tok">500</div><div class="hex">#6B6B6B</div></div>
    <div class="sw" style="background:#4D4D4D; color:#fff;"><div class="tok">600</div><div class="hex">#4D4D4D</div></div>
    <div class="sw" style="background:#2E2E2E; color:#fff;"><div class="tok">700</div><div class="hex">#2E2E2E</div></div>
    <div class="sw" style="background:#141414; color:#fff;"><div class="tok">900</div><div class="hex">#141414</div></div>
  </div>
</div>
</body></html>
