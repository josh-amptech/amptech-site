<!doctype html>
<!-- @dsCard group="Brand" name="Components — Navbar" subtitle="Sticky marketing nav with active-underline and red CTA" viewport="700x80" -->
<html><head><meta charset="utf-8"><title>Navbar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .nav {
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-body);
    white-space: nowrap;
  }
  .left { display: flex; align-items: center; gap: 28px; min-width: 0; }
  .logo img { height: 26px; display: block; }
  .links { display: flex; gap: 20px; font-size: 13px; color: var(--fg2); font-weight: 500; }
  .links a { color: inherit; text-decoration: none; position: relative; padding: 4px 0; white-space: nowrap; }
  .links a.active { color: var(--fg1); }
  .links a.active::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -6px;
    height: 2px; background: var(--amp-red);
  }
  .right { display: flex; align-items: center; gap: 14px; font-size: 13px; flex-shrink: 0; }
  .ghost { color: var(--fg2); text-decoration: none; white-space: nowrap; }
  .cta {
    background: var(--amp-red); color: #fff;
    padding: 9px 14px; border-radius: var(--r-3);
    font-weight: 600; font-size: 13px; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
</style></head>
<body>
<nav class="nav">
  <div class="left">
    <div class="logo"><img src="../assets/svg/logo-horizontal.svg" alt="AmpTech"></div>
    <div class="links">
      <a href="#" class="active">How we work</a>
      <a href="#">Services</a>
      <a href="#">Case studies</a>
      <a href="#">Playbook</a>
    </div>
  </div>
  <div class="right">
    <a class="ghost" href="#">Sign in</a>
    <a class="cta" href="#">Book a review →</a>
  </div>
</nav>
</body></html>
