<!doctype html>
<!-- @dsCard group="Brand" name="Spacing — Radii" subtitle="Angular: 0 → 14px. No pillowy shapes." viewport="700x180" -->
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .frame { padding: 20px 24px; font-family: var(--font-body); }
  .row { display:grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .box { width: 72px; height: 72px; background: var(--amp-ink); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg2); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
</style></head>
<body>
<div class="frame">
  <div class="row">
    <div class="item"><div class="box" style="border-radius:0"></div><div class="tok">--r-0</div><div class="val">0px</div></div>
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="tok">--r-1</div><div class="val">2px</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="tok">--r-2</div><div class="val">4px</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="tok">--r-3</div><div class="val">6px · buttons</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="tok">--r-4</div><div class="val">10px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div class="tok">--r-5</div><div class="val">14px · modals</div></div>
  </div>
</div>
</body></html>
