<!doctype html>
<!-- @dsCard group="Brand" name="Brand — Iconography (Lucide)" subtitle="2px stroke geometric set; substitution flagged" viewport="700x140" -->
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .frame { padding: 22px 24px; font-family: var(--font-body); display:flex; flex-direction:column; gap: 12px; }
  .row { display:grid; grid-template-columns: repeat(10, 1fr); gap: 10px; }
  .ico { display:flex; flex-direction:column; align-items:center; gap: 6px; color: var(--fg1); }
  .ico svg { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--fg3); }
  .cap { font-size: 10px; color: var(--fg3); letter-spacing:.1em; text-transform:uppercase; font-weight:600; }
</style></head>
<body>
<div class="frame">
  <div class="row">
    <div class="ico"><svg width="24" height="24" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><div class="lbl">check</div></div>
    <div class="ico"><svg width="24" height="24" viewBox="0 0 24 24"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg><div class="lbl">bolt</div></div>
    <div class="ico"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg><div class="lbl">arrow-right</div></div>
    <div class="ico"><svg width="24" height="24" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg><div class="lbl">code</div></div>
    <div class="ico"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/></svg><div class="lbl">refresh</div></div>
    <div class="ico" style="color: var(--accent);"><svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div class="lbl">alert</div></div>
    <div class="ico"><svg width="24" height="24" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg><div class="lbl">layout</div></div>
    <div class="ico"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg><div class="lbl">stack</div></div>

  </div>
