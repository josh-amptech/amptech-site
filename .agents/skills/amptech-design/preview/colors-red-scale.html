<!doctype html>
<!-- @dsCard group="Brand" name="Colors — Red Scale" subtitle="Subtle → Hot → Base → Deep → Ember" viewport="700x180" -->
<html><head><meta charset="utf-8"><title>Red Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .frame { padding: 20px 24px; font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .sw { border-radius: var(--r-3); padding: 12px; height: 110px; display:flex; flex-direction:column; justify-content:flex-end; color: #fff; }
  .name { font-size: 12px; font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
</style></head>
<body>
<div class="frame">
  <div class="row">
    <div class="sw" style="background:#FDECEA; color: var(--fg1);"><div class="name">Subtle</div><div class="hex">#FDECEA</div></div>
    <div class="sw" style="background:#EE2415;"><div class="name">Hot</div><div class="hex">#EE2415</div></div>
    <div class="sw" style="background:#D41E10;"><div class="name">Base</div><div class="hex">#D41E10</div></div>
    <div class="sw" style="background:#A21508;"><div class="name">Deep</div><div class="hex">#A21508</div></div>
    <div class="sw" style="background:#680E06;"><div class="name">Ember</div><div class="hex">#680E06</div></div>
  </div>
</div>
</body></html>
