<!doctype html>
<!-- @dsCard group="Brand" name="Spacing — 4pt Scale" subtitle="–s-1 through –s-11" viewport="700x280" -->
<html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .frame { padding: 20px 24px; font-family: var(--font-body); }
  .row { display:flex; flex-direction:column; gap: 6px; }
  .item { display:flex; align-items:center; gap: 12px; }
  .token { width: 56px; font-family: var(--font-mono); font-size: 11px; color: var(--fg3); }
  .bar { height: 14px; background: var(--amp-red); border-radius: 1px; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg2); }
</style></head>
<body>
<div class="frame">
  <div class="row">
    <div class="item"><div class="token">--s-1</div><div class="bar" style="width:4px"></div><div class="val">4</div></div>
    <div class="item"><div class="token">--s-2</div><div class="bar" style="width:8px"></div><div class="val">8</div></div>
    <div class="item"><div class="token">--s-3</div><div class="bar" style="width:12px"></div><div class="val">12</div></div>
    <div class="item"><div class="token">--s-4</div><div class="bar" style="width:16px"></div><div class="val">16</div></div>
    <div class="item"><div class="token">--s-5</div><div class="bar" style="width:20px"></div><div class="val">20</div></div>
    <div class="item"><div class="token">--s-6</div><div class="bar" style="width:24px"></div><div class="val">24</div></div>
    <div class="item"><div class="token">--s-7</div><div class="bar" style="width:32px"></div><div class="val">32</div></div>
    <div class="item"><div class="token">--s-8</div><div class="bar" style="width:40px"></div><div class="val">40</div></div>
    <div class="item"><div class="token">--s-9</div><div class="bar" style="width:56px"></div><div class="val">56</div></div>
    <div class="item"><div class="token">--s-10</div><div class="bar" style="width:72px"></div><div class="val">72</div></div>
    <div class="item"><div class="token">--s-11</div><div class="bar" style="width:96px"></div><div class="val">96</div></div>
  </div>
</div>
</body></html>
