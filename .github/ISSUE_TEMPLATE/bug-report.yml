name: Bug Report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: "What happened?"
      description: "Clear description of the bug."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "What did you expect?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "Environment"
      placeholder: "Chrome 121 / macOS 14 / 375px mobile"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots or logs"
      description: "Drag and drop images or paste console errors."
    validations:
      required: false
